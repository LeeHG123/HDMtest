data:
  modality: "1D"
  dataset: "Quadratic"
  num_data: 1000
  dimension: 100
  grid_type: "random"   # fixed geometry for precompute
  num_basis: 64
  hyp_len: 0.8
  hyp_gain: 1.0
  num_workers: 4

model:
  model_type: NUNO_FNO_1D
  # NUNO decomposition params
  n_subdomains: 8
  s_total: 4096
  s_min: 2
  n_bins_kl: 64
  n_split_candidates: 5
  align_size: 512
  kernel: triangular
  mix_subdomains: channel
  fixed_geometry: true
  rebuild_every_k: 0
  cache_decomposition: true
  cache_dir: ./.nuno_cache
  coord_scale: 10.0
  c_in_signal: 1
  c_out: 1
  # Base FNO hyperparameters
  fno_width: 256
  fno_modes: 64
  fno_layers: 4

diffusion:
  beta_schedule: cosine
  num_diffusion_timesteps: 1000

training:
  batch_size: 100
  n_epochs: 2000
  ckpt_store: 100
  val_freq: 100
  val_batch_size: 50
  lambda_norm: 1.0

sampling:
  batch_size: 1000
  clamp_threshold: 1000
  enable_rms_clip: true
  rms_clip_threshold: 0.9

optim:
  lr: 0.00001
  grad_clip: 1.0

