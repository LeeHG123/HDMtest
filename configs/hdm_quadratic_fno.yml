data:
    modality: "1D"
    #dataset: "Quadratic"
    #dataset: "Gaussian"
    dataset: "Doppler"
    num_data: 1000
    dimension: 100
    grid_type: "uniform" # x 좌표 생성 방식: "uniform" (균등) 또는 "random" (랜덤 샘플링) 
    num_basis: 100 # 사용할 기저 함수의 수. null이면 전체 사용 (예: 50)   
    hyp_len: 0.05 #Quadratic: 0.8 Doppler: 0.05
    hyp_gain: 1.0
    num_workers: 4

model:
    model_type: "NUFNO"
    n_modes: [100,]
    hidden_channels: 256
    in_channels: 2
    out_channels: 1
    lifting_channels: 256
    projection_channels: 256
    n_layers: 4
    norm: 'group_norm'
    preactivation: True
    skip: 'soft-gating'
    separable: True
    factorization: null
    rank: 1
    joint_factorization: False
    fixed_rank_modes: False
    implementation: 'factorized'
    # ----- freq scale options -----
    learnable_freq_scale: true
    per_layer_freq_scale: true
    freq_scale_min: 0.05
    freq_scale_max: 3.5
    freq_scale_init: 0.3    
    ckpt_dir: "./exp/logs/quadratic_experiment/ckpt_step_20000.pth"
    # --- AFNO 고유 하이퍼파라미터 추가 ---
    num_blocks: 8
    sparsity_threshold: 0.01
    hidden_size_factor: 2   
    hard_thresholding_fraction: 1.0

diffusion:
    beta_schedule: "cosine"
    num_diffusion_timesteps: 1000

training:
    batch_size: 100
    n_epochs: 2000
    ckpt_store: 100
    val_freq: 50  # Validation frequency (every N steps)
    val_batch_size: 50 
    lambda_norm: 0.0 # normalize weight

sampling:
    batch_size: 100
    clamp_threshold: 1000
    enable_rms_clip: true  # resolution-free RMS clipping 활성화 여부
    rms_clip_threshold: 1.1  #quadratic: 1.0 #doppler: 1.1  

optim:
    lr: 0.00001
    grad_clip: 1.0

